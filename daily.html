<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>企业每日行情管理</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",Arial,sans-serif;}
body{background-color:#e6f4ff;padding:20px 0;}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:30px;}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e0edff;}
.header h2{color:#0f5fa8;font-size:22px;}
.login-box{text-align:center;padding:20px;border-radius:8px;background:#f5faff;margin-bottom:20px;border:1px solid #d4e8ff;}
.login-box h3{color:#0f5fa8;margin-bottom:15px;font-size:18px;}
.login-input{padding:10px 14px;width:80%;max-width:300px;border:1px solid #c9dfff;border-radius:8px;margin-bottom:10px;font-size:15px;}
.login-btn{padding:10px 20px;background:#4096ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;}
.login-btn:hover{background:#2b7cd3;}
.form-group{margin-bottom:15px;}
.form-label{display:block;margin-bottom:6px;color:#0f5fa8;font-size:14px;font-weight:500;}
.form-input,.form-select{width:100%;padding:10px 12px;border:1px solid #c9dfff;border-radius:6px;font-size:14px;color:#226;}
.form-input:focus,.form-select:focus{outline:none;border-color:#4096ff;}
.save-btn{width:100%;padding:12px;background:#4096ff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;margin:20px 0;}
.save-btn:hover{background:#2b7cd3;}
.link-btn{display:block;text-align:center;color:#4096ff;text-decoration:none;font-size:14px;margin-top:10px;}
.link-btn:hover{text-decoration:underline;}
.content-box{display:none;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>企业每日行情录入系统</h2>
  </div>

  <div id="login" class="login-box">
    <h3>管理员身份验证</h3>
    <input type="password" id="pwd" class="login-input" placeholder="默认密码：123456">
    <button onclick="checkPwd()" class="login-btn">登录系统</button>
  </div>

  <div id="adminContent" class="content-box">
    <h3 style="color:#0f5fa8;margin-bottom:20px;">今日行情数据配置</h3>

    <div class="form-group"><label class="form-label">当日期货价格</label><input type="number" id="tf" class="form-input"></div>
    <div class="form-group"><label class="form-label">前一日期货价格</label><input type="number" id="lf" class="form-input"></div>
    <div class="form-group"><label class="form-label">现货价格</label><input type="number" id="sp" class="form-input"></div>
    <div class="form-group"><label class="form-label">当前需求量</label><input type="number" id="cd" class="form-input"></div>
    <div class="form-group"><label class="form-label">前一期需求量</label><input type="number" id="ld" class="form-input"></div>
    <div class="form-group"><label class="form-label">市场影响因子</label><input type="number" step="0.0001" id="mf" class="form-input"></div>
    <div class="form-group"><label class="form-label">碳排放强度</label><input type="number" step="0.0001" id="ci" class="form-input"></div>
  <div class="form-group"><label class="form-label">期权费</label><input id="d7" class="form-input"></div>

    <div class="form-group">
      <label class="form-label">需求程度</label>
      <select id="dt" class="form-select">
        <option value="cold">冷淡</option>
        <option value="normal">正常</option>
        <option value="hot">火热</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">检修等级</label>
      <select id="mt" class="form-select">
        <option value="none">无检修</option>
        <option value="ordinary">正常检修</option>
        <option value="large">大型检修</option>
        <option value="national">全国检修</option>
      </select>
    </div>

    <button onclick="saveDaily()" class="save-btn">保存今日行情数据</button>
    <a href="admin.html" class="link-btn">进入参数配置后台</a>
  </div>
</div>

<script>
function checkPwd(){
  if(document.getElementById("pwd").value=="123456"){
    document.getElementById("login").style.display="none";
    document.getElementById("adminContent").style.display="block";
    loadData();
  }else{alert("密码错误，请重新输入");}
}
function loadData(){
  let d=getDailyData();
  document.getElementById("tf").value=d.todayFutures;
  document.getElementById("lf").value=d.lastFutures;
  document.getElementById("sp").value=d.spotPrice;
  document.getElementById("cd").value=d.currDemand;
  document.getElementById("ld").value=d.lastDemand;
  document.getElementById("mf").value=d.marketFactor;
  document.getElementById("ci").value=d.carbonIntensity;
  document.getElementById("dt").value=d.demandType;
  document.getElementById("mt").value=d.maintainType;
}
function saveDaily(){
  let data={
    todayFutures:Number(document.getElementById("tf").value),
    lastFutures:Number(document.getElementById("lf").value),
    spotPrice:Number(document.getElementById("sp").value),
    currDemand:Number(document.getElementById("cd").value),
    lastDemand:Number(document.getElementById("ld").value),
    marketFactor:Number(document.getElementById("mf").value),
    carbonIntensity:Number(document.getElementById("ci").value),
    demandType:document.getElementById("dt").value,
    maintainType:document.getElementById("mt").value
  };
  localStorage.setItem("dailyData",JSON.stringify(data));
  alert("✅ 今日行情数据保存成功！客户页面已同步最新数据");
}
</script>
</body>
</html>
