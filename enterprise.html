<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>企业内部｜聚烯烃含权贸易测算</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",Arial,sans-serif;}
body{background-color:#e6f4ff;padding:20px 0;}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:30px;}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e0edff;}
.header h2{color:#0f5fa8;font-size:22px;}
.form-group{margin-bottom:15px;display:flex;align-items:center;}
.form-label{width:180px;color:#0f5fa8;font-size:14px;font-weight:500;}
.form-input,.form-select{flex:1;padding:10px 12px;border:1px solid #c9dfff;border-radius:6px;font-size:14px;color:#226;}
.form-input:focus,.form-select:focus{outline:none;border-color:#4096ff;box-shadow:0 0 0 3px rgba(64,150,255,0.12);}
.btn-calculate{width:100%;padding:12px;background-color:#4096ff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;margin:20px 0;}
.btn-calculate:hover{background-color:#2b7cd3;}
.link-group{text-align:center;margin-bottom:20px;}
.link-btn{color:#4096ff;text-decoration:none;font-size:14px;margin:0 10px;}
.link-btn:hover{text-decoration:underline;}
.result-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.result-table th{background-color:#f5faff;padding:12px 14px;text-align:left;color:#0f5fa8;font-weight:500;font-size:14px;border-bottom:1px solid #e0edff;}
.result-table td{padding:12px 14px;color:#226;font-size:14px;border-bottom:1px solid #f0f7ff;}
.result-table tr:last-child td{border-bottom:none;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>企业内部专属 · 全指标测算工具</h2>
  </div>

  <div class="form-group">
    <label class="form-label">目的地→北京直线距离：</label>
    <input type="number" step="1" id="lineDist" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">产品类型：</label>
    <select id="productType" class="form-select">
      <option value="L">L产品</option>
      <option value="PP">PP产品</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">当日期货价格：</label>
    <input type="number" step="0.01" id="todayFutures" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">前一日期货价格：</label>
    <input type="number" step="0.01" id="lastFutures" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">现货价格：</label>
    <input type="number" step="0.01" id="spotPrice" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">当前需求量：</label>
    <input type="number" step="0.01" id="currDemand" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">前一时间区间需求量：</label>
    <input type="number" step="0.01" id="lastDemand" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">市场影响因子：</label>
    <input type="number" step="0.0001" id="marketFactor" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">碳排放强度：</label>
    <input type="number" step="0.0001" id="carbonIntensity" class="form-input">
  </div>
  <div class="form-group">
  <label class="form-label">期权费</label>
  <input id="d7" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">下游需求程度：</label>
    <select id="demandType" class="form-select">
      <option value="cold">冷淡</option>
      <option value="normal">正常</option>
      <option value="hot">火热</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">检修度等级：</label>
    <select id="maintainType" class="form-select">
      <option value="none">无检修</option>
      <option value="ordinary">正常检修</option>
      <option value="large">大型检修</option>
      <option value="national">全国检修</option>
    </select>
  </div>

  <button onclick="startCalc()" class="btn-calculate">一键全量测算</button>

  <div class="link-group">
    <a href="index.html" class="link-btn">返回客户首页</a>
    <a href="admin.html" class="link-btn">后台参数配置</a>
  </div>

  <table class="result-table" id="resultTable">
    <thead>
      <tr>
        <th>测算指标</th>
        <th>结果</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
function startCalc(){
  let data = {
    lineDist: Number(document.getElementById("lineDist").value),
    productType: document.getElementById("productType").value,
    todayFutures: Number(document.getElementById("todayFutures").value),
    lastFutures: Number(document.getElementById("lastFutures").value),
    spotPrice: Number(document.getElementById("spotPrice").value),
    currDemand: Number(document.getElementById("currDemand").value),
    lastDemand: Number(document.getElementById("lastDemand").value),
    marketFactor: Number(document.getElementById("marketFactor").value),
    carbonIntensity: Number(document.getElementById("carbonIntensity").value),
    demandType: document.getElementById("demandType").value,
    maintainType: document.getElementById("maintainType").value
  };

  let res = calculate(data.lineDist, data.productType);
  let html = "";
  for(let key in res){
    html += `<tr><td>${key}</td><td>${res[key]}</td></tr>`;
  }
  document.getElementById("resultBody").innerHTML = html;
}
</script>
</body>
</html>
